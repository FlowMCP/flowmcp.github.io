name: Generate llms.txt Layers (v4)

on:
  push:
    branches: [main]
    paths:
      - 'src/content/docs/**'
      - 'public/spec-source/**'
      - 'scripts/generate-llms-txt.mjs'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Fetch refs from Spec (PRD-25 dependency)
        run: npm run fetch-refs

      - name: Generate llms.txt layers
        run: npm run generate-llms

      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain public/llms*.txt public/docs-llms.txt)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/llms*.txt public/docs-llms.txt
          git commit -m "chore: regenerate llms.txt [auto]"
          git push origin HEAD:${{ github.ref_name }}
