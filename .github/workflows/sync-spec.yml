# Sync Spec from flowmcp-spec (Source of Truth) — Targets: src/content/docs/specification/ + public/spec-generated/docs-payload/
name: Sync Spec from flowmcp-spec

on:
  repository_dispatch:
    types: [spec-updated]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout flowmcp.github.io
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          path: flowmcp.github.io
          ref: ${{ github.ref_name }}

      - name: Checkout flowmcp-spec (sibling for sync-spec.mjs)
        uses: actions/checkout@v4
        with:
          repository: FlowMCP/flowmcp-spec
          path: flowmcp-spec
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: flowmcp.github.io
        run: npm ci

      # Race-safe sync: a concurrent push (another auto-run or a manual push) can move
      # the branch between checkout and push. A plain `git pull --rebase` would CONFLICT
      # on the per-run `generated_at` timestamps in the synced files. Instead, on a
      # rejected push we hard-reset to the latest remote and re-run the (deterministic)
      # sync on that new base, then retry — conflict-free because the content is fully
      # derived from flowmcp-spec.
      - name: Sync, commit and push (race-safe)
        working-directory: flowmcp.github.io
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          PATHS="src/content/docs/specification/ src/content/docs/grading/ src/content/docs/best-practice/ public/spec-generated/docs-payload/ src/data/manifest.json"
          BRANCH="${{ github.ref_name }}"
          for attempt in 1 2 3 4 5; do
            npm run sync-spec
            if [ -z "$(git status --porcelain $PATHS)" ]; then
              echo "No spec changes to sync — nothing to commit (attempt $attempt)."
              exit 0
            fi
            git add $PATHS
            git commit -m "chore: sync spec from flowmcp-spec [auto]"
            if git push origin HEAD:"$BRANCH"; then
              echo "Pushed on attempt $attempt."
              # A push made with GITHUB_TOKEN does NOT trigger deploy.yml's
              # `on: push` (GitHub loop-protection), so synced spec changes would
              # never go live on their own. Explicitly dispatch the deploy
              # workflow. (Alternative: push these changes with a PAT instead of
              # GITHUB_TOKEN, which would trigger `on: push` naturally.)
              if [ "$BRANCH" = "main" ]; then
                gh workflow run deploy.yml --ref "$BRANCH" || echo "::warning::deploy dispatch failed; site may not redeploy until next push"
              fi
              exit 0
            fi
            echo "Push rejected on attempt $attempt — concurrent push moved $BRANCH. Resetting to remote and re-syncing."
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"
          done
          echo "::error::sync-spec push failed after 5 attempts (persistent concurrent pushes)."
          exit 1
