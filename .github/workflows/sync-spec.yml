# Sync Spec from flowmcp-spec (Source of Truth) — Targets: src/content/docs/specification/ + public/spec-generated/docs-payload/
name: Sync Spec from flowmcp-spec

on:
  repository_dispatch:
    types: [spec-updated]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Sync spec
        run: npm run sync-spec

      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain src/content/docs/specification/ public/spec-generated/docs-payload/ src/data/manifest.json)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/docs/specification/ public/spec-generated/docs-payload/ src/data/manifest.json
          git commit -m "chore: sync spec from flowmcp-spec [auto]"
          git push
